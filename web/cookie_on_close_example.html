<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cookie On Close Demo</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        background: white;
        padding: 2.5rem 3rem;
        border-radius: 16px;
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
        text-align: center;
        max-width: 420px;
      }

      h1 {
        margin-top: 0;
      }

      p {
        margin-bottom: 0;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cookie On Close Demo</h1>
      <p id="status">Checking cookie…</p>
    </main>

    <script>
      const COOKIE_NAME = "closedOnce";

      const getCookie = (name) =>
        document.cookie
          .split(";")
          .map((cookie) => cookie.trim())
          .find((cookie) => cookie.startsWith(`${name}=`));

      const setCookie = () => {
        const expires = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000);
        document.cookie = `${COOKIE_NAME}=true; expires=${expires.toUTCString()}; path=/`;
      };

      window.addEventListener("beforeunload", setCookie);

      window.addEventListener("DOMContentLoaded", () => {
        const status = document.getElementById("status");
        if (getCookie(COOKIE_NAME)) {
          status.textContent =
            "Cookie detected! This text appears because you closed the page before.";
        } else {
          status.textContent =
            "No cookie yet. Close or reload this tab to set one.";
        }
      });
    </script>
  </body>
</html>
